name: Build and test

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            9.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"

      # SDK 9 provides NuGet Audit while the application still targets .NET 6.
      - name: Restore and audit dependencies
        shell: pwsh
        run: >-
          dotnet restore DivaModManager.sln
          -p:NuGetAudit=true
          -p:NuGetAuditMode=all
          -p:WarningsAsErrors=NU1901%3BNU1902%3BNU1903%3BNU1904

      - name: Test
        run: dotnet test DivaModManager.sln -c Release --no-restore

      - name: Package smoke test
        shell: pwsh
        run: ./scripts/pack-release.ps1 -Version 0.0.0-ci -SkipTests -NoArchive

      - name: Upload packaged application
        uses: actions/upload-artifact@v4
        with:
          name: DivaModManager-win-x64-${{ github.sha }}
          path: artifacts/release/DivaModManager-v0.0.0-ci-win-x64
          if-no-files-found: error
