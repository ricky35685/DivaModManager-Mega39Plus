name: Debug Build and Test

on: [push, pull_request]

jobs:
  build-release:
    runs-on: windows-latest

    env:
      # Skip dotnet's first-run package cache initialization in CI.
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout and Initialise
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Test
        run: dotnet test DivaModManager.Tests/DivaModManager.Tests.csproj -c Release

      - name: Build release
        run: dotnet publish DivaModManager/DivaModManager.csproj -c Release -p:PublishSingleFile=true --self-contained false

      # Upload build artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DMM-singlefile-${{ github.sha }}
          path: |
            DivaModManager/bin/Release/net6.0-windows/win10-x64/publish
            !DivaModManager/bin/Release/net6.0-windows/win10-x64/publish/DivaModManager
